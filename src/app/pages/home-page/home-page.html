<div class="container">
    <div class="room-card">
        @for(room of queueRooms; let index = $index; track $index) {
            <app-room-card-component
                [roomNumber]="room.queueRoom"
                [queueNumber]="room.queueNo"
            ></app-room-card-component>
        }
    </div>
    
</div>
